name: Superagent CI

on:
  push:
    paths:
      - 'superagent/**'
  pull_request:
    paths:
      - 'superagent/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: superagent

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile main.py agents/*.py routes/*.py utils/*.py tools/*.py

      - name: Start server (smoke test)
        env:
          GROQ_API_KEY: dummy_key_for_ci
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sports-wager-superagent ./superagent
